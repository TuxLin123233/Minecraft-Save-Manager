name: 打包小林工具箱

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 安装 PyInstaller
      run: pip install pyinstaller
    
    - name: 打包成 exe
      run: |
        pyinstaller -F --icon="icon.ico" --name="XiaoLinToolbox" main.py
    
    - name: 上传 exe 文件
      uses: actions/upload-artifact@v4
      with:
        name: XiaoLinToolbox-Windows
        path: dist/*.exe