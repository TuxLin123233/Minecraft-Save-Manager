name: 打包存档管理器

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3
      
      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: 安装依赖
        run: |
          pip install -r requirements.txt
      
      - name: 打包成 exe
        run: |
          cd code
          pyinstaller -F `
            --icon="../icon.ico" `
            --name="存档管理器" `
            --add-data="img;img" `
            main.py
      
      - name: 上传 exe 文件
        uses: actions/upload-artifact@v4
        with:
          name: SaveManager-Windows
          path: code/dist/*.exe